name: Credit Risk CI

on:
  push:
    branches: [ main ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build with Maven
        run: mvn clean package

      - name: Build Docker Image
        run: docker build -t creditrisk-app .

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Image
        run: |
          docker tag creditrisk-app ${{ secrets.DOCKER_USERNAME }}/creditrisk-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/creditrisk-app:latest